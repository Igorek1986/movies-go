name: CI

# Проверка на каждый push/PR в dev и main: сборка фронта + бэкенда, go vet.
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./cmd/...
