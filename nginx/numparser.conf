# movies-go — пример reverse-proxy для nginx.
#
# Без кэширования на стороне nginx: приложение само кэширует категории
# (in-memory), а кэш на прокси создаёт риск отдать чужую авторизованную сессию
# (ключ кэша не знает про cookie). Отдельные location нужны там, где обычный
# `location /` с коротким таймаутом и буферизацией мешает:
#   • WebSocket (real-time синк таймкодов и профилей) — апгрейд + длинный таймаут;
#   • SSE (живые логи админки, прогресс синка MyShows) — без буферизации.
# Всё остальное (SPA, API, /np.js, /blocked.png, картинки) — через `location /`.
#
# Поменяй server_name на свой домен. HTTPS навесит certbot — он сам добавит
# listen 443, сертификаты и HTTP→HTTPS-редирект:  certbot --nginx -d <домен>

server {
    listen 80;
    server_name numparser.igorek1986.ru;

    client_max_body_size 15M;  # импорт резервной копии (устройства/таймкоды)

    # ── Telegram webhook ──
    location /bot/ {
        proxy_pass http://127.0.0.1:8888/bot/;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # ── WebSocket: real-time синк таймкодов ──
    location = /timecode/ws {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── WebSocket: real-time синк профилей ──
    location = /api/plugin-settings/ws {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── SSE: живые логи админки (без буферизации, длинный таймаут) ──
    location = /api/admin/logs {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # ── SSE: прогресс синка MyShows ──
    location = /myshows/sync {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
    
       # ── Восстановление БД: большой upload + долгий restore через psql ──
    location = /api/admin/restore {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 0;        # дамп растёт вместе с БД — без лимита
        proxy_request_buffering off;   # стримим тело в приложение
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Бэкап БД: длинный стрим pg_dump ──
    location = /api/admin/backup {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;           # отдаём поток сразу, без буферизации
        proxy_read_timeout 3600s;
    }

    # ── Всё остальное ──
    location / {
        proxy_pass http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
