# movies-go — пример reverse-proxy для nginx.
#
# Без кэширования на стороне nginx: приложение само кэширует категории
# (in-memory), а кэш на прокси создаёт риск отдать чужую авторизованную
# сессию (ключ кэша не знает про cookie). WebSocket и вебхук бота — отдельными
# location; всё остальное (SPA, API, /np.js, /blocked.png, картинки) — через
# общий `location /`, где Upgrade-заголовки обслуживают и /api/plugin-settings/ws.
#
# Поменяй server_name на свой домен. HTTPS навесит certbot — он сам добавит
# listen 443, сертификаты и HTTP→HTTPS-редирект:  certbot --nginx -d <домен>

server {
    listen 80;
    server_name numparser.igorek1986.ru;

    client_max_body_size 15M;  # импорт резервной копии (устройства/таймкоды)

    # ── Telegram webhook ──
    location /bot/ {
        proxy_pass http://127.0.0.1:8888/bot/;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # ── WebSocket — реал-тайм синхронизация таймкодов ──
    location /timecode/ws {
        proxy_pass http://127.0.0.1:8888/timecode/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Всё остальное ──
    location / {
        proxy_pass http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade    $http_upgrade;   # пропускаем и WebSocket (профили)
        proxy_set_header Connection upgrade;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
