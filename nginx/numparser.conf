# movies-go — пример reverse-proxy для nginx (HTTPS через certbot).
#
# Принципы:
#   • Кэшируется ТОЛЬКО публичный контент (SPA, каталог, /blocked.png, картинки).
#   • Авторизованные и админ-ответы приложение помечает `Cache-Control: no-store`,
#     и nginx их не кэширует (map $no_cache ниже) — даже через общий `location /`.
#   • WebSocket (реал-тайм таймкоды и профили) и SSE (логи, прогресс синка)
#     проксируются без буферизации и с длинным таймаутом.
#   • Заблокированным клиентам (bylampa и т.п.) картинку отдаёт само приложение
#     по `/blocked.png` — отдельный статический location НЕ нужен.
#
# Поменяй server_name на свой домен. Строки ssl_* добавит certbot
# (`certbot --nginx -d <домен>`).

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:8m inactive=30m max_size=128m;

# Приложение шлёт no-store на персональные/админ ответы → не кэшируем их.
map $upstream_http_cache_control $no_cache {
    default          0;
    "~*no-store"     1;
    "~*no-cache"     1;
}

# Поддержка WebSocket-апгрейда.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    server_name numparser.igorek1986.ru;

    # Импорт резервной копии (устройства/таймкоды) может весить несколько МБ.
    client_max_body_size 50m;

    # Общие proxy-заголовки — наследуются всеми location, которые их не переопределяют.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    # ── WebSocket: реал-тайм синхронизация таймкодов и настроек профилей ──
    location = /timecode/ws {
        proxy_pass http://localhost:8888;
        proxy_cache off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
    location = /api/plugin-settings/ws {
        proxy_pass http://localhost:8888;
        proxy_cache off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # ── SSE-стримы: живые логи админки и прогресс синка MyShows ──
    location = /api/admin/logs {
        proxy_pass http://localhost:8888;
        proxy_cache off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
    location = /myshows/sync {
        proxy_pass http://localhost:8888;
        proxy_cache off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # ── Telegram webhook ──
    location /bot/ {
        proxy_pass http://localhost:8888;
        proxy_cache off;
    }

    # ── Динамическое и приватное — без кэша ──
    location /admin {
        proxy_pass http://localhost:8888;
        proxy_cache off;
    }
    location /api/admin {
        proxy_pass http://localhost:8888;
        proxy_cache off;
    }
    location /device/ {                 # активация устройств (поллинг статуса/кода)
        proxy_pass http://localhost:8888;
        proxy_cache off;
    }
    location /timecode/ {               # Lampa API: таймкоды per-device (?token=)
        proxy_pass http://localhost:8888;
        proxy_cache off;
    }
    location /stats {
        proxy_pass http://localhost:8888;
        proxy_cache off;
    }

    # ── Всё остальное: SPA, публичный каталог, /blocked.png, картинки ──
    # Кэшируем 200/302 на 15 минут, но уважаем no-store от приложения.
    location / {
        proxy_pass http://localhost:8888;

        proxy_cache       api_cache;
        proxy_cache_key   "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 302 15m;
        proxy_no_cache     $no_cache;
        proxy_cache_bypass $no_cache;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    listen 443 ssl;  # managed by Certbot
    # ssl_certificate     /etc/letsencrypt/live/<домен>/fullchain.pem;  # managed by Certbot
    # ssl_certificate_key /etc/letsencrypt/live/<домен>/privkey.pem;    # managed by Certbot
    # include             /etc/letsencrypt/options-ssl-nginx.conf;       # managed by Certbot
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;             # managed by Certbot
}

# HTTP → HTTPS
server {
    listen 80;
    server_name numparser.igorek1986.ru;
    return 301 https://$host$request_uri;
}
