<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Lampa</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;
     background:var(--tg-theme-bg-color,#fff);color:var(--tg-theme-text-color,#000);
     padding:0 0 80px}
.section{padding:12px 16px}
.card{background:var(--tg-theme-secondary-bg-color,#f2f2f7);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;
     border-bottom:1px solid rgba(128,128,128,.15)}
.row:last-child{border-bottom:none;padding-bottom:0}
.row:first-child{padding-top:0}
h2{font-size:17px;font-weight:600;margin-bottom:12px;color:var(--tg-theme-text-color,#000)}
h3{font-size:15px;font-weight:600;margin-bottom:8px}
.muted{color:var(--tg-theme-hint-color,#8e8e93);font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-premium{background:#ffd60020;color:#cc8800}
.badge-simple{background:#007aff20;color:#007aff}
.badge-super{background:#34c75920;color:#1a8c3b}
.btn{display:inline-flex;align-items:center;justify-content:center;height:32px;padding:0 12px;
     border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;
     background:var(--tg-theme-button-color,#007aff);color:var(--tg-theme-button-text-color,#fff)}
.btn-sm{height:26px;padding:0 8px;font-size:12px}
.btn-danger{background:#ff3b3020;color:#ff3b30}
.btn-secondary{background:rgba(128,128,128,.15);color:var(--tg-theme-text-color,#000)}
.tabs{display:flex;border-bottom:1px solid rgba(128,128,128,.2);margin-bottom:12px}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:13px;cursor:pointer;
     border-bottom:2px solid transparent;color:var(--tg-theme-hint-color,#8e8e93)}
.tab.active{border-bottom-color:var(--tg-theme-button-color,#007aff);
            color:var(--tg-theme-button-color,#007aff);font-weight:600}
input,select{width:100%;height:36px;padding:0 10px;border:1px solid rgba(128,128,128,.3);
             border-radius:8px;background:var(--tg-theme-bg-color,#fff);
             color:var(--tg-theme-text-color,#000);font-size:14px}
.loading{text-align:center;padding:32px;color:var(--tg-theme-hint-color,#8e8e93)}
.unread-dot{width:8px;height:8px;background:#ff3b30;border-radius:50%;flex-shrink:0}
#root{min-height:100vh}
</style>
</head>
<body>
<div id="root"><div class="loading">Загрузка…</div></div>
<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const API = '/tg-app/api';
let state = { auth: null, view: 'me', devices: null, selectedDevice: null, users: null, messages: null };

async function api(method, path, body) {
  const initData = tg?.initData || '';
  const opts = {
    method: method || 'GET',
    headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': initData }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.status); }
  return r.json();
}

async function init() {
  try {
    const initData = tg?.initData || '';
    const r = await fetch(API + '/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData })
    });
    state.auth = await r.json();
    if (!r.ok) { render('<div class="section"><p>Ошибка авторизации</p></div>'); return; }
  } catch(e) { render('<div class="section"><p>Нет соединения</p></div>'); return; }
  renderMain();
}

function render(html) {
  document.getElementById('root').innerHTML = html;
}

function renderMain() {
  const a = state.auth;
  if (!a.ok) { render('<div class="section"><p>Ошибка</p></div>'); return; }
  const tabs = a.is_admin
    ? [['me','\u{1F464} Мой аккаунт'],['users','\u{1F465} Пользователи'],['msgs','\u{1F4AC} Сообщения'],['stats','\u{1F4CA} Статистика'],['cfg','⚙️ Настройки']]
    : [['me','\u{1F464} Мой аккаунт']];
  renderView(tabs);
}

function renderView(tabs) {
  const tabHtml = tabs.map(function(t) {
    return '<div class="tab ' + (state.view===t[0]?'active':'') + '" onclick="switchTab(\'' + t[0] + '\')">' + t[1] + '</div>';
  }).join('');
  render('<div class="tabs">' + tabHtml + '</div><div id="view-content"><div class="loading">Загрузка…</div></div>');
  loadView();
}

function switchTab(v) {
  state.view = v;
  state.selectedDevice = null;
  renderMain();
}

async function loadView() {
  const el = document.getElementById('view-content');
  try {
    switch(state.view) {
      case 'me': await loadMe(el); break;
      case 'users': await loadUsers(el); break;
      case 'msgs': await loadMessages(el); break;
      case 'stats': await loadStats(el); break;
      case 'cfg': await loadSettings(el); break;
    }
  } catch(e) { el.innerHTML = '<div class="section"><p class="muted">Ошибка: ' + e.message + '</p></div>'; }
}

// ── Me ───────────────────────────────────────────────────────────────────────
async function loadMe(el) {
  if (state.selectedDevice) { await loadDeviceDetail(el, state.selectedDevice); return; }
  if (!state.auth.is_linked) {
    el.innerHTML = '<div class="section"><div class="card"><p>Telegram не привязан к аккаунту.</p><p class="muted" style="margin-top:6px">Перейдите в личный кабинет на сайте, чтобы привязать Telegram.</p></div></div>';
    return;
  }
  const me = await api('GET', '/me');
  const roleClass = {'premium':'badge-premium','super':'badge-super'}[me.role] || 'badge-simple';
  let devHtml = me.devices.map(function(d) {
    return '<div class="row"><div><div>' + d.name + '</div><div class="muted">' + d.timecodes_count + ' таймкодов \xB7 ' + d.created_at + '</div></div><button class="btn btn-sm btn-secondary" onclick="openDevice(' + d.id + ')">Управление</button></div>';
  }).join('');
  el.innerHTML = '<div class="section"><h2>Мой аккаунт</h2><div class="card"><div class="row"><span>Логин</span><strong>' + me.username + '</strong></div><div class="row"><span>Роль</span><span class="badge ' + roleClass + '">' + me.role_label + '</span></div><div class="row"><span>Устройств</span><span>' + me.device_count + ' / ' + (me.device_limit || '∞') + '</span></div></div><h3>Устройства</h3><div class="card">' + (devHtml || '<p class="muted">Нет устройств</p>') + '</div><button class="btn" style="width:100%;margin-top:8px" onclick="createDevice()">+ Добавить устройство</button></div>';
}

async function openDevice(id) {
  state.selectedDevice = id;
  await loadView();
}

async function loadDeviceDetail(el, deviceId) {
  const d = await api('GET', '/me/devices/' + deviceId);
  const profileHtml = (d.profiles||[]).map(function(p) {
    return '<div class="row"><div><div>' + p.name + '</div><div class="muted">' + p.profile_id + '</div></div><button class="btn btn-sm btn-danger" onclick="deleteProfile(' + deviceId + ',\'' + p.profile_id + '\')">Удалить</button></div>';
  }).join('');
  el.innerHTML = '<div class="section"><button class="btn btn-secondary btn-sm" onclick="state.selectedDevice=null;loadView()" style="margin-bottom:12px">← Назад</button><h2>' + d.name + '</h2><div class="card"><div class="row"><span>Токен</span><code style="font-size:11px;word-break:break-all">' + d.token + '</code></div></div><div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-secondary btn-sm" onclick="renameDevice(' + deviceId + ')">Переименовать</button><button class="btn btn-sm" onclick="regenerateToken(' + deviceId + ')">Новый токен</button><button class="btn btn-sm btn-danger" onclick="clearTimecodes(' + deviceId + ')">Очистить историю</button><button class="btn btn-sm btn-danger" onclick="deleteDevice(' + deviceId + ')">Удалить</button></div><h3>Профили (' + (d.profiles||[]).length + ' / ' + (d.profile_limit || '∞') + ')</h3><div class="card">' + (profileHtml || '<p class="muted">Нет профилей</p>') + '</div><button class="btn btn-secondary" style="width:100%;margin-top:8px" onclick="createProfile(' + deviceId + ')">+ Добавить профиль</button></div>';
}

async function createDevice() {
  const name = prompt('Название устройства:'); if (!name) return;
  try { await api('POST', '/me/devices/create', {name}); state.devices = null; await loadView(); }
  catch(e) { alert('Ошибка: ' + e.message); }
}
async function renameDevice(id) {
  const name = prompt('Новое название:'); if (!name) return;
  try { await api('POST', '/me/devices/' + id + '/rename', {name}); await loadView(); }
  catch(e) { alert('Ошибка: ' + e.message); }
}
async function deleteDevice(id) {
  if (!confirm('Удалить устройство?')) return;
  try { await api('POST', '/me/devices/' + id + '/delete'); state.selectedDevice=null; await loadView(); }
  catch(e) { alert('Ошибка: ' + e.message); }
}
async function regenerateToken(id) {
  if (!confirm('Сгенерировать новый токен?')) return;
  try { const r = await api('POST', '/me/devices/' + id + '/regenerate'); alert('Новый токен: ' + r.token); await loadView(); }
  catch(e) { alert('Ошибка: ' + e.message); }
}
async function clearTimecodes(id) {
  if (!confirm('Очистить всю историю?')) return;
  try { await api('POST', '/me/devices/' + id + '/clear-timecodes'); alert('История очищена'); await loadView(); }
  catch(e) { alert('Ошибка: ' + e.message); }
}
async function createProfile(deviceId) {
  const name = prompt('Название профиля:'); if (!name) return;
  try { await api('POST', '/me/devices/' + deviceId + '/profiles/create', {name}); await loadView(); }
  catch(e) { alert('Ошибка: ' + e.message); }
}
async function deleteProfile(deviceId, profileId) {
  if (!confirm('Удалить профиль?')) return;
  try { await api('POST', '/me/devices/' + deviceId + '/profiles/' + profileId + '/delete'); await loadView(); }
  catch(e) { alert('Ошибка: ' + e.message); }
}

// ── Users ─────────────────────────────────────────────────────────────────────
async function loadUsers(el) {
  const q = el.querySelector && el.querySelector('#users-q') ? el.querySelector('#users-q').value : '';
  const data = await api('GET', '/users' + (q ? '?q='+encodeURIComponent(q) : ''));
  const roleClass = function(r) { return ({'premium':'badge-premium','super':'badge-super'}[r]||'badge-simple'); };
  const rows = data.users.map(function(u) {
    const blocked = u.blocked_at
      ? '<button class="btn btn-sm btn-secondary" onclick="unblockUser(' + u.id + ')">Разблокировать</button>'
      : '<button class="btn btn-sm btn-danger" onclick="blockUser(' + u.id + ')">Заблокировать</button>';
    const blockedBadge = u.blocked_at ? '<span class="badge" style="background:#ff3b3020;color:#ff3b30;margin-left:4px">blocked</span>' : '';
    const tgInfo = u.tg_username ? '@' + u.tg_username + ' \xB7 ' : '';
    const roles = ['simple','premium','super'].map(function(r) { return '<option ' + (u.role===r?'selected':'') + '>' + r + '</option>'; }).join('');
    return '<div class="row"><div><strong>' + u.username + '</strong><span class="badge ' + roleClass(u.role) + '" style="margin-left:4px">' + u.role + '</span>' + blockedBadge + '<div class="muted">' + tgInfo + u.device_count + ' уст \xB7 ' + u.created_at + '</div></div><div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end"><select onchange="setRole(' + u.id + ',this.value)" style="width:90px;height:26px;font-size:11px">' + roles + '</select>' + blocked + '</div></div>';
  }).join('');
  el.innerHTML = '<div class="section"><h2>Пользователи (' + data.users.length + ')</h2><input id="users-q" placeholder="Поиск по имени…" value="' + q + '" oninput="debounceSearch()" style="margin-bottom:12px"><div class="card">' + (rows || '<p class="muted">Нет результатов</p>') + '</div></div>';
}
let searchTimer;
function debounceSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(function() { loadView(); }, 400); }

async function setRole(id, role) {
  try { await api('POST', '/users/' + id + '/role', {role}); }
  catch(e) { alert('Ошибка: ' + e.message); loadView(); }
}
async function blockUser(id) {
  const reason = prompt('Причина блокировки (необязательно):');
  if (reason === null) return;
  try { await api('POST', '/users/' + id + '/block', {reason}); await loadView(); }
  catch(e) { alert('Ошибка: ' + e.message); }
}
async function unblockUser(id) {
  try { await api('POST', '/users/' + id + '/unblock'); await loadView(); }
  catch(e) { alert('Ошибка: ' + e.message); }
}

// ── Messages ──────────────────────────────────────────────────────────────────
async function loadMessages(el) {
  const data = await api('GET', '/messages');
  const convHtml = data.conversations.map(function(c) {
    const lastMsg = c.messages && c.messages.length ? c.messages[c.messages.length-1] : null;
    const unread = c.has_unread ? '<div class="unread-dot"></div>' : '';
    const preview = lastMsg && lastMsg.text ? lastMsg.text.slice(0,50) : '';
    const lastTime = lastMsg ? lastMsg.created_at : '';
    return '<div class="row" style="cursor:pointer" onclick="openConv(' + c.user_telegram_id + ')"><div><div style="display:flex;align-items:center;gap:6px"><strong>@' + (c.user_username || c.user_telegram_id) + '</strong>' + unread + '</div><div class="muted">' + preview + '</div></div><div class="muted">' + lastTime + '</div></div>';
  }).join('');
  el.innerHTML = '<div class="section"><h2>Сообщения</h2><div class="card">' + (convHtml || '<p class="muted">Нет сообщений</p>') + '</div></div>';
}

async function openConv(tgId) {
  const data = await api('GET', '/messages');
  const conv = data.conversations.find(function(c) { return c.user_telegram_id === tgId; });
  if (!conv) return;
  await api('POST', '/messages/' + tgId + '/read');
  const msgs = (conv.messages||[]).map(function(m) {
    const isOut = m.direction === 'out';
    const bg = isOut ? 'var(--tg-theme-button-color,#007aff)' : 'rgba(128,128,128,.15)';
    const color = isOut ? 'var(--tg-theme-button-text-color,#fff)' : 'inherit';
    const align = isOut ? 'text-align:right' : '';
    return '<div style="margin-bottom:8px;' + align + '"><div style="display:inline-block;max-width:80%;padding:6px 10px;border-radius:10px;font-size:13px;background:' + bg + ';color:' + color + '">' + m.text + '</div><div class="muted" style="font-size:11px;margin-top:2px">' + m.created_at + '</div></div>';
  }).join('');
  const el = document.getElementById('view-content');
  el.innerHTML = '<div class="section"><button class="btn btn-secondary btn-sm" onclick="switchTab(\'msgs\')" style="margin-bottom:12px">← Назад</button><h2>@' + (conv.user_username || tgId) + '</h2><div style="max-height:50vh;overflow-y:auto;margin-bottom:12px">' + msgs + '</div><div style="display:flex;gap:8px"><input id="reply-text" placeholder="Ответить…" style="flex:1"><button class="btn" onclick="sendReply(' + tgId + ')">Отправить</button></div></div>';
}
async function sendReply(tgId) {
  const text = document.getElementById('reply-text').value.trim();
  if (!text) return;
  try { await api('POST', '/messages/' + tgId + '/reply', {text}); await openConv(tgId); }
  catch(e) { alert('Ошибка: ' + e.message); }
}

// ── Stats ─────────────────────────────────────────────────────────────────────
async function loadStats(el) {
  const s = await api('GET', '/stats');
  el.innerHTML = '<div class="section"><h2>Статистика</h2><div class="card"><div class="row"><span>Всего пользователей</span><strong>' + s.total_users + '</strong></div><div class="row"><span>Premium</span><strong>' + (s.role_counts.premium||0) + '</strong></div><div class="row"><span>Simple</span><strong>' + (s.role_counts.simple||0) + '</strong></div><div class="row"><span>Super</span><strong>' + (s.role_counts.super||0) + '</strong></div><div class="row"><span>С Telegram</span><strong>' + s.tg_linked + '</strong></div><div class="row"><span>Новых сегодня</span><strong>' + s.new_users_today + '</strong></div></div><div class="card" style="margin-top:8px"><div class="row"><span>Устройств</span><strong>' + s.total_devices + '</strong></div><div class="row"><span>Таймкодов</span><strong>' + s.total_timecodes + '</strong></div><div class="row"><span>Активных сегодня</span><strong>' + s.tcs_today + '</strong></div><div class="row"><span>Непрочитанных</span><strong>' + s.unread_support + '</strong></div></div></div>';
}

// ── Settings ──────────────────────────────────────────────────────────────────
async function loadSettings(el) {
  const data = await api('GET', '/settings');
  const groupHtml = data.groups.map(function(g) {
    const items = g.items.map(function(i) {
      return '<div class="row"><span style="flex:1;min-width:0;font-size:12px">' + i.key + '</span><input value="' + i.value + '" style="width:80px;height:28px;font-size:12px" onchange="saveSetting(\'' + i.key + '\',this.value)"></div>';
    }).join('');
    return '<h3 style="margin-top:12px;margin-bottom:4px">' + g.name + '</h3><div class="card">' + items + '</div>';
  }).join('');
  el.innerHTML = '<div class="section"><h2>Настройки</h2>' + groupHtml + '</div>';
}
async function saveSetting(key, value) {
  try { await api('POST', '/settings', {key, value}); }
  catch(e) { alert('Ошибка: ' + e.message); }
}

init();
</script>
</body>
</html>
