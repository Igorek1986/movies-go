{{define "title"}}История просмотров{{end}}

{{define "body"}}
<main class="container" style="padding-top: 1.5rem;">
  {{with .Data}}
  {{if not .Devices}}
  <p style="text-align:center;color:var(--pico-muted-color);padding:3rem 0">
    Устройства не найдены. <a href="/profiles">Добавьте устройство</a>.
  </p>
  {{else}}
  <div class="history-controls">
    {{if gt (len .Devices) 1}}
    <select id="historyDeviceSelect">
      {{range .Devices}}
      <option value="{{.ID}}">{{.Name}}</option>
      {{end}}
    </select>
    {{else}}
    <input type="hidden" id="historyDeviceSelect" value="{{(index .Devices 0).ID}}">
    {{end}}

    <div id="historyProfileTabs"></div>

    <div class="stats-tabs">
      <button class="tab-btn active" id="historyFilterAll">Все</button>
      <button class="tab-btn" id="historyFilterMovie">Фильмы</button>
      <button class="tab-btn" id="historyFilterTv">Сериалы</button>
      <button class="tab-btn" id="historyFilterWatching">В&nbsp;процессе</button>
    </div>

    <select id="historySortSelect" class="sort-select">
      <option value="watched">По дате просмотра</option>
      <option value="release">По дате выхода</option>
      <option value="pct_asc">По прогрессу ↑</option>
      <option value="pct_desc">По прогрессу ↓</option>
    </select>

    <div style="width: 200px; margin-left: auto;">
      <input type="search" id="historySearch" placeholder="Поиск…" class="history-search">
    </div>
  </div>

  <div id="historyGrid" class="history-grid"></div>
  {{end}}
  {{end}}
</main>
{{end}}

{{define "scripts"}}
{{with .Data}}
{{if .Devices}}
<script>window.TMDB_IMAGE_BASE = "{{.ImageBase}}";</script>
<script src="/static/js/history.js"></script>
<script>initHistory({{(index .Devices 0).ID}});</script>
{{end}}
{{end}}
{{end}}
