<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Астронавт -->
  <circle cx="100" cy="100" r="100" fill="#0A0A2A"/>
  <!-- Звёзды на фоне -->
  <circle cx="30" cy="25" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="55" cy="15" r="1" fill="white" opacity="0.6"/>
  <circle cx="80" cy="30" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="130" cy="18" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="160" cy="35" r="1" fill="white" opacity="0.6"/>
  <circle cx="170" cy="20" r="1.8" fill="white" opacity="0.9"/>
  <circle cx="20" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="175" cy="70" r="1.2" fill="white" opacity="0.7"/>

  <!-- Скафандр — тело -->
  <ellipse cx="100" cy="172" rx="58" ry="35" fill="#DDDDEE"/>
  <ellipse cx="100" cy="158" rx="50" ry="28" fill="#EEEEFF"/>
  <!-- Американский флаг на плече -->
  <rect x="62" y="150" width="18" height="11" rx="1" fill="#CC0000"/>
  <rect x="62" y="150" width="18" height="4" rx="1" fill="#CC0000"/>
  <rect x="62" y="154" width="18" height="3" fill="white"/>
  <rect x="62" y="157" width="18" height="4" fill="#CC0000"/>
  <rect x="62" y="150" width="8" height="7" rx="1" fill="#002288"/>
  <!-- Разъёмы на костюме -->
  <circle cx="130" cy="155" r="4" fill="#AAAACC" stroke="#8888AA" stroke-width="1"/>
  <circle cx="140" cy="162" r="3" fill="#AAAACC" stroke="#8888AA" stroke-width="1"/>
  <!-- Логотип на груди -->
  <circle cx="100" cy="155" r="8" fill="#AAAACC" stroke="white" stroke-width="1.5"/>
  <circle cx="100" cy="155" r="4" fill="#0044AA"/>

  <!-- Шлем скафандра -->
  <ellipse cx="100" cy="96" rx="50" ry="52" fill="#CCCCDD"/>
  <ellipse cx="100" cy="94" rx="46" ry="48" fill="#DDDDEF"/>
  <!-- Стекло визора -->
  <ellipse cx="100" cy="96" rx="34" ry="36" fill="#88AADD" opacity="0.6"/>
  <ellipse cx="100" cy="94" rx="32" ry="34" fill="#99BBEE" opacity="0.5"/>
  <!-- Отражение в стекле -->
  <ellipse cx="88" cy="82" rx="8" ry="12" fill="white" opacity="0.25" transform="rotate(-20,88,82)"/>
  <!-- Лицо в шлеме -->
  <ellipse cx="94" cy="94" rx="8" ry="7.5" fill="white"/>
  <ellipse cx="108" cy="94" rx="8" ry="7.5" fill="white"/>
  <circle cx="95" cy="95" r="4.5" fill="#3A5A8A"/>
  <circle cx="109" cy="95" r="4.5" fill="#3A5A8A"/>
  <circle cx="95" cy="93" r="2" fill="#111"/>
  <circle cx="109" cy="93" r="2" fill="#111"/>
  <circle cx="97" cy="92" r="1" fill="white"/>
  <circle cx="111" cy="92" r="1" fill="white"/>
  <!-- Рот (улыбка) -->
  <path d="M90,104 Q100,111 110,104" fill="none" stroke="#C06040" stroke-width="2"/>
  <!-- Кольцо шлема -->
  <ellipse cx="100" cy="138" rx="50" ry="12" fill="#BBBBCC"/>
  <ellipse cx="100" cy="136" rx="48" ry="10" fill="#CCCCDD"/>
</svg>
