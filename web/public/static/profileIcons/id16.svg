<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Супергерой -->
  <circle cx="100" cy="100" r="100" fill="#EEF0FF"/>

  <!-- Плащ (за спиной) -->
  <path d="M68,200 Q54,168 48,140 Q44,118 60,116 Q72,148 100,156 Q128,148 140,116 Q156,118 152,140 Q146,168 132,200 Z" fill="#CC0033"/>

  <!-- Тело -->
  <rect x="60" y="148" width="80" height="56" rx="10" fill="#1A1ACC"/>
  <!-- Молния -->
  <path d="M95,152 L104,163 L97,163 L106,176" fill="none" stroke="#FFD700" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Пояс -->
  <rect x="60" y="162" width="80" height="9" rx="3" fill="#FFD700"/>
  <rect x="90" y="160" width="20" height="13" rx="2" fill="#FFD700"/>
  <circle cx="100" cy="166" r="3.5" fill="#CC8800"/>

  <!-- Шея -->
  <rect x="86" y="130" width="28" height="22" rx="6" fill="#FFDDAA"/>

  <!-- Голова -->
  <ellipse cx="100" cy="102" rx="38" ry="40" fill="#FFDDAA"/>

  <!-- Маска — верхняя половина лица -->
  <path d="M62,94 Q100,78 138,94 L138,112 Q120,104 100,106 Q80,104 62,112 Z" fill="#1A1ACC"/>
  <!-- Прорези для глаз -->
  <ellipse cx="85" cy="100" rx="12" ry="10" fill="#FFDDAA"/>
  <ellipse cx="115" cy="100" rx="12" ry="10" fill="#FFDDAA"/>
  <!-- Обводка прорезей -->
  <ellipse cx="85" cy="100" rx="12" ry="10" fill="none" stroke="#0000AA" stroke-width="1.5"/>
  <ellipse cx="115" cy="100" rx="12" ry="10" fill="none" stroke="#0000AA" stroke-width="1.5"/>

  <!-- Волосы над маской -->
  <path d="M62,94 Q68,76 100,72 Q132,76 138,94" fill="#3A2A10"/>

  <!-- Глаза -->
  <ellipse cx="86" cy="100" rx="8" ry="7.5" fill="white"/>
  <ellipse cx="115" cy="100" rx="8" ry="7.5" fill="white"/>
  <circle cx="87" cy="101" r="5" fill="#2255AA"/>
  <circle cx="116" cy="101" r="5" fill="#2255AA"/>
  <circle cx="87" cy="99" r="2.2" fill="#111"/>
  <circle cx="116" cy="99" r="2.2" fill="#111"/>
  <circle cx="89" cy="98" r="1.1" fill="white"/>
  <circle cx="118" cy="98" r="1.1" fill="white"/>

  <!-- Нос -->
  <ellipse cx="100" cy="112" rx="4" ry="3" fill="#E8A878"/>
  <!-- Рот -->
  <path d="M88,120 Q100,129 112,120" fill="none" stroke="#C06040" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Кулак -->
  <path d="M140,152 Q158,138 162,120 Q165,107 157,99" fill="none" stroke="#FFDDAA" stroke-width="13" stroke-linecap="round"/>
  <ellipse cx="155" cy="96" rx="11" ry="10" fill="#FFDDAA"/>
  <ellipse cx="155" cy="96" rx="12" ry="11" fill="#1A1ACC" opacity="0.55"/>
  <line x1="146" y1="93" x2="164" y2="93" stroke="#FFDDAA" stroke-width="1.5"/>
  <line x1="146" y1="98" x2="164" y2="98" stroke="#FFDDAA" stroke-width="1.5"/>
</svg>
