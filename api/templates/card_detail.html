{% extends "base.html" %}
{% block title %}Загрузка…{% endblock %}

{% block body %}
<div style="max-width:860px;margin:0 auto" data-no-card-autofocus>

  <div id="cardLoading" style="text-align:center;padding:4rem 0;color:var(--pico-muted-color)">
    Загрузка…
  </div>

  <!-- Floating back button (appears on scroll) -->
  <a id="cardBackFloat" class="card-detail-back-float" href="/history">← Назад</a>

  <div id="cardContent" style="display:none">

    <!-- Backdrop + back button -->
    <div style="position:relative">
      <img id="cardBackdrop" class="card-detail-backdrop" alt="" style="display:none">
      <div id="cardNoBackdrop" style="height:120px;background:var(--pico-code-background-color);display:none"></div>
      <a id="cardBack" class="card-detail-back" href="/history">← Назад</a>
    </div>

    <div class="card-detail-body">
      <h1 id="cardTitle" class="card-detail-title"></h1>
      <p id="cardOrigTitle" class="card-detail-orig" style="display:none"></p>
      <div id="cardTags" class="card-detail-tags"></div>
      <div id="cardWatchSection" style="display:none;margin-top:.6rem">
        <button id="cardWatchBtn" class="card-watch-btn">Смотрю</button>
      </div>
      <div id="cardViewCount" style="display:none;margin-top:.4rem;font-size:.82rem;color:var(--pico-muted-color)"></div>
      <p id="cardOverview" class="card-detail-overview" style="display:none"></p>

      <!-- Progress (logged-in with device) -->
      <div id="cardProgressSection" style="display:none;border-top:1px solid var(--pico-muted-border-color);padding-top:.75rem;margin-top:.5rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem;font-size:.85rem;color:var(--pico-muted-color)">
          <span id="cardProgressLabel"></span>
          <button id="cardDeleteBtn" class="modal-delete-btn" title="Удалить историю просмотра" style="display:none">🗑</button>
        </div>
        <div class="modal-progress-bar"><div id="cardProgressFill" class="modal-progress-fill" style="width:0%"></div></div>
      </div>

      <!-- Episodes (TV) -->
      <!-- Актёры -->
      <div id="cardCastSection" style="display:none;margin-top:1.25rem;border-top:1px solid var(--pico-muted-border-color);padding-top:.75rem">
        <h3 style="font-size:.95rem;margin-bottom:.6rem;color:var(--pico-muted-color)">В ролях</h3>
        <div id="cardCastList" class="card-cast-list"></div>
      </div>

      <!-- Похожее -->
      <div id="cardRecsSection" style="display:none;margin-top:1.25rem;border-top:1px solid var(--pico-muted-border-color);padding-top:.75rem">
        <h3 style="font-size:.95rem;margin-bottom:.6rem;color:var(--pico-muted-color)">Похожее</h3>
        <div id="cardRecsList" class="catalog-grid catalog-grid--recs"></div>
      </div>

      <div id="cardEpisodesSection"></div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
window.TMDB_IMAGE_BASE = "{{ image_base }}";
window.CARD_ID = {{ card_id | tojson }};
</script>
<script src="/static/js/card_detail.js"></script>
{% endblock %}
