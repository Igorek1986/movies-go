{% extends "base.html" %}
{% block title %}Вход — Админ{% endblock %}

{% block body %}
<main class="container auth-container">
  <article>
    <hgroup>
      <h2>Админ-панель</h2>
      <p>NUMParser</p>
    </hgroup>

    {% if error %}<p role="alert" class="alert-error">{{ error }}</p>{% endif %}

    <form method="POST" action="/admin/login">
      <label>
        Пароль
        <input type="password" name="password" required autofocus>
      </label>
      <button type="submit">Войти</button>
    </form>
  </article>
</main>
{% endblock %}
