services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-lampa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lampa}
      POSTGRES_DB: ${DB_NAME:-lampa}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lampa} -d ${DB_NAME:-lampa}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgres://${DB_USER:-lampa}:${DB_PASSWORD:-lampa}@db:5432/${DB_NAME:-lampa}?sslmode=disable
      - HTTP_PORT=${PORT:-8888}
    ports:
      - "${PORT:-8888}:${PORT:-8888}"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./plugins:/app/plugins
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
