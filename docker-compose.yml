services:
  db:
    image: postgres:16-alpine
    container_name: movies-api-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-movies_api}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-movies_api}
      POSTGRES_DB: ${DB_NAME:-movies_api}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-movies_api} -d ${DB_NAME:-movies_api}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: movies-api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgres://${DB_USER:-movies_api}:${DB_PASSWORD:-movies_api}@db:5432/${DB_NAME:-movies_api}?sslmode=disable
      - HTTP_PORT=${PORT:-8888}
    ports:
      - "${PORT:-8888}:${PORT:-8888}"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./plugins:/app/plugins
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
  logs_data:
