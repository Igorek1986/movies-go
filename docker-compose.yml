services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "${PORT:-8888}:8888"
    volumes:
      - ./api/app:/app/app
      - ./api/lampa-plugins:/app/lampa-plugins
      - ./api/static:/app/static
    depends_on:
      db:
        condition: service_healthy

  parser:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable
      - TMDB_TOKEN=${TMDB_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  pg_data:
